<!DOCTYPE html>
<html>
<head>
    <title>Bike Quest: City Streets</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #00ffcc; border-radius: 10px; width: 250px; }
        #inventory { position: absolute; bottom: 20px; right: 20px; color: #ff00ff; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #ff00ff; border-radius: 10px; }
        .stat { color: #ffff00; font-weight: bold; }
        #label-container { position: absolute; top: 0; left: 0; pointer-events: none; }
        .world-label { position: absolute; color: white; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 5px; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 18px; border-bottom: 1px solid #00ffcc; margin-bottom: 10px;">NEIGHBORHOOD HERO</div>
        <div id="quest-text">Follow the road to the Store!</div>
        <p>Wallet: $<span id="money" class="stat">0</span></p>
        <p>Bike Speed: <span id="speed-lvl" class="stat">1</span></p>
    </div>
    <div id="inventory">
        <strong>BACKPACK</strong><br>
        Items: <span id="storage-count">0</span> / <span id="max-storage">3</span>
    </div>
    <div id="label-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

<script type="module">
    import * as THREE from 'three';

    // --- GAME STATE ---
    let gameState = { money: 0, bagItems: 0, maxBag: 3, speedLevel: 1 };
    const traffic = [];
    const labels = [];

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x707070));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    // --- WORLD BUILDING ---
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    function createRoad(w, h, x, z, rot = 0) {
        const road = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2;
        road.rotation.z = rot;
        road.position.set(x, 0.02, z);
        scene.add(road);
    }

    // Main Street and Side Street (The Turn)
    createRoad(20, 200, 0, 0); // Straight road
    createRoad(20, 100, 50, -100, Math.PI/2); // Turn to the right

    function createHouse(x, z, color, name) {
        const house = new THREE.Group();
        const base = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), new THREE.MeshStandardMaterial({ color: color }));
        base.position.y = 4;
        house.add(base);
        const roof = new THREE.Mesh(new THREE.ConeGeometry(8, 5, 4), new THREE.MeshStandardMaterial({ color: 0x442200 }));
        roof.position.y = 10.5;
        roof.rotation.y = Math.PI / 4;
        house.add(roof);
        house.position.set(x, 0, z);
        scene.add(house);
        return house;
    }

    // Neighbors
    const neighbors = [
        createHouse(-20, 20, 0x4287f5, "Neighbor A"),
        createHouse(-20, -20, 0x9b59b6, "Neighbor B"),
        createHouse(20, 50, 0xe67e22, "Neighbor C")
    ];

    // Grocery Store
    const store = new THREE.Mesh(new THREE.BoxGeometry(20, 12, 20), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
    store.position.set(100, 6, -100);
    scene.add(store);

    // Floating UI Label for Store
    const storeLabel = document.createElement('div');
    storeLabel.className = 'world-label';
    storeLabel.innerHTML = "🛒 GROCERY STORE";
    document.getElementById('label-container').appendChild(storeLabel);
    labels.push({ element: storeLabel, position: new THREE.Vector3(100, 15, -100) });

    // --- TRAFFIC ---
    function createNPCVehicle(zPos, speed, color) {
        const car = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 7), new THREE.MeshStandardMaterial({ color: color }));
        car.position.set(5, 1.5, zPos);
        scene.add(car);
        traffic.push({ mesh: car, speed: speed });
    }
    createNPCVehicle(0, 0.5, 0xff0000);
    createNPCVehicle(-80, 0.3, 0xffffff);

    // --- PLAYER ---
    const player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    body.position.y = 1.5;
    player.add(body);
    const bike = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0x00ffcc }));
    bike.position.y = 0.5;
    player.add(bike);
    scene.add(player);

    // --- LOGIC ---
    const keys = {};
    let velocity = 0;
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    function updateUI() {
        document.getElementById('money').innerText = gameState.money;
        document.getElementById('storage-count').innerText = gameState.bagItems;
        document.getElementById('max-storage').innerText = gameState.maxBag;
        document.getElementById('speed-lvl').innerText = gameState.speedLevel;
    }

    function animate() {
        requestAnimationFrame(animate);

        // Movement
        let accel = 0.006 * gameState.speedLevel;
        if (keys['w']) velocity += accel;
        if (keys['s']) velocity -= accel;
        velocity *= 0.96;
        if (keys['a']) player.rotation.y += 0.05;
        if (keys['d']) player.rotation.y -= 0.05;
        player.translateZ(velocity);

        // NPC Car Movement
        traffic.forEach(car => {
            car.mesh.position.z += car.speed;
            if (car.mesh.position.z > 100) car.mesh.position.z = -100;
        });

        // Camera Smooth Follow
        const camOffset = new THREE.Vector3(0, 8, -15).applyMatrix4(player.matrixWorld);
        camera.position.lerp(camOffset, 0.1);
        camera.lookAt(player.position);

        // UI Labels Positioning
        labels.forEach(label => {
            const vector = label.position.clone().project(camera);
            if(vector.z < 1) {
                label.element.style.display = 'block';
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5 - 0.5) * window.innerHeight);
                label.element.style.transform = `translate(${x}px, ${y}px)`;
            } else {
                label.element.style.display = 'none';
            }
        });

        // Interactions
        if (player.position.distanceTo(store.position) < 15 && gameState.bagItems < gameState.maxBag) {
            gameState.bagItems = gameState.maxBag;
            document.getElementById('quest-text').innerText = "Deliver to a neighbor's house!";
            updateUI();
        }

        neighbors.forEach(n => {
            if (player.position.distanceTo(n.position) < 10 && gameState.bagItems > 0) {
                gameState.money += 20;
                gameState.bagItems = 0;
                document.getElementById('quest-text').innerText = "Thanks! Get more at the Store.";
                updateUI();
            }
        });

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
